{% extends "base.html" %}
{% block title %}Deposit — NexaBank{% endblock %}
{% block content %}

<div class="page-title">Deposit Funds</div>
<div class="page-sub">Add money to one of your accounts.</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('deposit') }}" data-once>
    <div class="mb-3">
      <label class="form-label">Destination Account</label>
      <select name="account_id" class="form-select" required>
        {% for acc in accounts %}
        <option value="{{ acc.id }}" {% if request.args.get('account') == acc.id|string %}selected{% endif %}>
          {{ acc.account_no }} ({{ acc.account_type }}) — INR {{ "{:,.2f}".format(acc.balance) }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Amount (INR)</label>
      <input type="text" name="amount" class="form-control amount-input"
             placeholder="0.00" required inputmode="decimal">
    </div>
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn-primary-bank">Deposit</button>
      <a href="{{ url_for('dashboard') }}" class="btn-secondary-bank">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
