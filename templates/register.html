{% extends "base.html" %}
{% block title %}Create Account — NexaBank{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">A checking account will be opened automatically.</div>

    <form method="POST" action="{{ url_for('register') }}" data-once>
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" name="full_name" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone <span style="color:var(--text-muted)">(optional)</span></label>
        <input type="tel" name="phone" class="form-control">
      </div>
      <div class="grid-2 mb-3">
        <div>
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 chars" required>
        </div>
        <div>
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat" required>
        </div>
      </div>
      <button type="submit" class="btn-primary-bank w-100">Open Account</button>
    </form>

    <hr class="divider">
    <p class="fs-sm text-center" style="color:var(--text-muted)">
      Already have an account?
      <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>

{% endblock %}
